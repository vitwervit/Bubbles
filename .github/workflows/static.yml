# Деплой статической страницы bubbles.html на GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Права для GITHUB_TOKEN, необходимые для публикации на Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой за раз; запущенные не отменяем, очередь схлопываем до последней.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        # Готовим папку для публикации: bubbles.html становится index.html,
        # чтобы сайт открывался по корневому URL.
        # Сам bubbles.html тоже оставляем — на случай, если на него где-то ссылаются.
        run: |
          mkdir -p _site
          cp bubbles.html _site/index.html
          cp bubbles.html _site/bubbles.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
